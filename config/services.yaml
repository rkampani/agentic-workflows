# Agentic Performance Testing Platform — Service Registry
#
# Endpoint filtering:
#   include_endpoints → ONLY these endpoints are tested
#   exclude_endpoints → these endpoints are SKIPPED
#   Patterns: "GET /api/orders*", "POST *", "*/admin/*"
#
# Test data (like JMeter CSV Data Set Config):
#   test_data_file → JSON file with array of rows
#   Each VU gets a different row (round-robin)
#   Row fields replace {placeholders} in paths and provide body data
#
#   Flat style (preferred — OpenAPI schema filters which fields go in the body):
#     {"user_id": "1", "billToId": 1223, "amount": 100}
#     → GET /api/v1/users/{user_id}/history  resolves to  /api/v1/users/1/history
#     → POST /api/v1/orders body = {"billToId": 1223, "amount": 100}  (only OpenAPI fields)
#
#   Explicit style (for rows covering multiple endpoints with different bodies):
#     {"user_id": "1", "body_POST_/api/v1/orders": {"billToId": 1223}}
#     → body_<METHOD>_<path> targets a specific endpoint explicitly
#     → fallback key: body_<last-path-segment>  (e.g. body_orders)
#
# Authentication:
#   auth → k6 calls this endpoint ONCE in setup() before load starts.
#   The returned token is shared across all VUs. No static token files needed.
#
#   auth:
#     url: "http://host/auth/token"    # POST endpoint that returns a token
#     username: "testuser"
#     password: "testpass"
#     token_field: "access_token"      # optional — which JSON field holds the token
#                                      # (default: tries access_token, token, id_token)

services:

  recommendation-engine:
    description: "ML-powered product recommendations"
    team: "data"
    framework: "fastapi"
    swagger_path: "/openapi.json"
    environments:
      local: "http://localhost:8000"
      staging: "http://localhost:8000"

  user-service:
    description: "User management, profiles"
    team: "platform"
    framework: "spring-boot"
    swagger_path: "/v3/api-docs"
    environments:
      local: "http://localhost:8083"
      staging: "http://localhost:8083"

  payment-service:
    description: "payment-Service"
    team: "health"
    framework: "spring"
    swagger_path: "/v3/api-docs"
    environments:
      local: "http://localhost:9080/payment-service/v1"
      dev: "http://localhost:9080/payment-service/v1"
      staging: "http://localhost:8000"
    test_data_file: "test-data/payment-service/payment-service.json"
    auth:
      url: "http://localhost:9080/auth/token"
      username: "testuser"
      password: "testpass"
      # token_field defaults to "access_token" (see config/defaults.yaml)
    include_endpoints:
      - "GET /order-payment/electronic-check/{entityType}/{entityId}"
    exclude_endpoints:
      - "GET /health"
      - "/metrics*"
    max_concurrent_users: 3
    max_duration_seconds: 30

# Safety settings
defaults:
  max_concurrent_users: 500
  max_duration_seconds: 600
  allowed_environments:
    - local
    - dev
    - staging
